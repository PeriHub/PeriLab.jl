    block_1:
      Block ID: 1
      Material Model: UMAT
      Density: 7800
      Horizon: 1.2
      Specific Heat Capacity: 1800.
  Boundary Conditions:
    BC_1:
      Coordinate: x
      Node Set: Right
      Variable: Displacements
      Value: 1*t
      Type: Dirichlet
    BC_2:
      Coordinate: z
      Node Set: Front
      Variable: Displacements
      Value: 0
      Type: Dirichlet
    BC_3:
      Coordinate: x
      Node Set: Left
      Variable: Displacements
      Value: 0
      Type: Dirichlet
    BC_4:
      Coordinate: y
      Node Set: Bottom
      Variable: Displacements
      Value: 0
      Type: Dirichlet
    Temp:
      Node Set: All
      Variable: Temperature
      Value: 20
      Type: Initial
  Solver:
    Initial Time: 0.0
    Final Time: 0.01
    Thermal Models: True
    Verlet Matrix Based:
      # Fixed dt: 0.1
      Safety Factor: 0.95
      Numerical Damping: 0.05
  Outputs:
    Output1:
      Number of Output Steps: 10
      Output File Type: Exodus
      Output Filename: umat_matrix
      Output Variables:
        Displacements: True
        Forces: True
        Cauchy Stress: True
        State Variables: True
        Temperature: True
