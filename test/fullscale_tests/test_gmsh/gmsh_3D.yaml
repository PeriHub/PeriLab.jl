PeriLab:
  Discretization:
    Type: "Gmsh"
    Input Mesh File: "gmsh_3d.msh"
    Node Sets:
      Node Set 1: "x < 0.1"
      Node Set 2: "x > 0.9"
  Blocks:
    block_1:
      Block ID: 1
      Density: 2.81e-09
      Horizon: 0.2
      Material Model: Aluminium
  Boundary Conditions:
    BC_1:
      Coordinate: x
      Node Set: Node Set 1
      Variable: Displacements
      Value: -4.4*t
      Type: Dirichlet
    BC_2:
      Coordinate: x
      Node Set: Node Set 2
      Variable: Displacements
      Value: 4.4*t
      Type: Dirichlet
  Outputs:
    Output1:
      Number of Output Steps: 10
      Output Filename: gmsh_3D
      Output File Type: Exodus
      Output Variables:
        Displacements: true
        Forces: true
        Number of Neighbors: true
        Volume: True
  Models:
    Material Models:
      Aluminium:
        Material Model: "PD Solid Elastic"
        Zero Energy Control: "Global"
        Symmetry: isotropic
        Young's Modulus: 71700.0
        Poisson's Ratio: 0.33
  Solver:
    Final Time: 0.000002
    Initial Time: 0.0
    Material Models: true
    Verlet:
      Safety Factor: 0.9
      Numerical Damping: 5.0e-06
